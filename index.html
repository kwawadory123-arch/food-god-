<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&amp;display=swap');
  
  body { font-family: 'Noto Sans JP', system-ui, sans-serif; background: #0f0f14; color: #fff; }
  
  .god {
    position: absolute;
    width: 92px; height: 92px;
    border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: grab; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    user-select: none;
    border: 5px solid #fff;
  }
  .god.dragging { transform: scale(1.15); opacity: 0.75; z-index: 999; }
  .god.aura { box-shadow: 0 0 30px #ffd700, 0 0 60px #ffd700; animation: aura-pulse 2s infinite; }
  .god.secretz { box-shadow: 0 0 40px #ff3366, 0 0 80px #ff3366; border-color: #ff3366; }
  
  @keyframes aura-pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
  
  .god.spawn { animation: spawnBounce 0.65s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes spawnBounce {
    0%{transform:scale(0.3)} 50%{transform:scale(1.25)} 70%{transform:scale(0.95)} 100%{transform:scale(1)}
  }
  
  #board { position: relative; width: 920px; height: 720px; background: #16161f; border: 8px solid #333; border-radius: 28px; overflow: hidden; box-shadow: inset 0 0 100px rgba(0,0,0,0.7); }
  
  .merge-flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 150; }
  
  .popup {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.7);
    background: #1f1f28; border: 4px solid #555; border-radius: 24px; padding: 32px; z-index: 300;
    display: none; box-shadow: 0 25px 70px rgba(0,0,0,0.7); min-width: 380px; text-align: center;
  }
  .popup.show { display: block; animation: popupIn 0.3s ease forwards; }
  @keyframes popupIn { from {transform: translate(-50%,-50%) scale(0.6); opacity:0} to {transform: translate(-50%,-50%) scale(1); opacity:1} }
  
  .login-board {
    animation: boardDrop 0.8s cubic-bezier(0.23,1,0.32,1);
  }
  @keyframes boardDrop { from {transform: translateY(-120%);} to {transform: translateY(0);} }
  
  .stamp { transition: transform 0.15s ease; }
  .stamp:active { transform: scale(0.85); }
  
  .floating-text {
    position: absolute; font-weight: 700; pointer-events: none; z-index: 200;
    animation: floatUp 0.7s forwards;
  }
  @keyframes floatUp { to { transform: translateY(-80px); opacity: 0; } }
  
  .synergy-line { position: absolute; height: 4px; background: linear-gradient(to right, #ffd700, #fff); box-shadow: 0 0 15px #ffd700; pointer-events: none; z-index: 50; }

[...baseGods, ...secretS, ...secretZPool, ...limitedPool].forEach(g => allGods[g.id] = g);

function getGodById(id) { return allGods[id]; }

// ==================== Game Loop ====================
setInterval(() => {
  let total = 0;
  placedGods.forEach(g => total += g.data.baseProduction * g.currentRank);
  const gain = Math.floor(total * synergyMultiplier);
  if (gain > 0) addCurrency(gain);
  updateUI();
}, 1000);

// 旨味自動変換（追加要素）
setInterval(() => {
  if (umami >= 50) {
    const bundles = Math.floor(umami / 50);
    const converted = bundles * 1000;
    umami -= bundles * 50;
    addCurrency(converted);
    showFloatingText(`変換 +¥${formatNumber(converted)}`, true);
    updateUI();
  }
}, 200);

// ==================== タップ（神タップで旨味追加） ====================
function tapMainArea() {
  addCurrency(tapGain);
  showFloatingText(`+${tapGain}`);
}

function tapGod(godObj) {
  addUmami(godObj.data.tapBonus || 1);
  showFloatingText(`+${godObj.data.tapBonus || 1} 旨味`, false, godObj.element);
}

// ==================== 召喚・配置 ====================
function spawnGod(godData, x = 200, y = 200) {
  const div = document.createElement('div');
  div.className = `god ${godData.rarity === 'SecretS' ? 'aura' : ''} ${godData.rarity === 'SecretZ' ? 'secretz' : ''}`;
  div.style.left = `${x}px`;
  div.style.top = `${y}px`;
  div.style.borderColor = getRarityColor(godData.rarity);
  div.innerHTML = `
    <div style="font-size:34px; margin-bottom:2px;">${getEmoji(godData)}</div>
    <div style="font-size:11px; font-weight:700; line-height:1.1;">${godData.displayName}</div>
    <div style="font-size:9px; color:#aaa;">RANK ${godData.rank || 1}</div>
  `;

  div.godData = godData;
  div.currentRank = godData.rank || 1;

  // 配置時バウンド + 発光（原作忠実）
  div.classList.add('spawn');
  setTimeout(() => div.classList.remove('spawn'), 650);

  // タップで旨味（追加要素）
  div.onclick = () => tapGod({element: div, data: godData});

  // ドラッグ開始
  div.onpointerdown = (e) => startDrag(e, div);

  boardEl.appendChild(div);
  placedGods.push({element: div, data: godData, currentRank: godData.rank || 1});
  
  recalculateSynergy();
  return div;
}

function getRarityColor(r) {
  if (r === 'SecretZ') return '#ff3366';

  if (r === 'Secret') return '#aa66ff';
  if (r === 'UltraRare') return '#00aaff';
  if (r === 'Rare') return '#00cc66';
  return '#666';
}

function getGodById(id) { return allGods[id]; }

// ==================== ドラッグ＆マージ（原作忠実 + 3体根源追加） ====================
let dragged = null;

function startDrag(e, godDiv) {
  dragged = godDiv;
  godDiv.classList.add('dragging');
  
  const rect = boardEl.getBoundingClientRect();
  const offsetX = e.clientX - rect.left - godDiv.offsetLeft;
  const offsetY = e.clientY - rect.top - godDiv.offsetTop;

  function move(ev) {
    if (!dragged) return;
    const br = boardEl.getBoundingClientRect();
    dragged.style.left = `${ev.clientX - br.left - offsetX}px`;
    dragged.style.top = `${ev.clientY - br.top - offsetY}px`;
  }

  function end() {
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', end);
    godDiv.classList.remove('dragging');
    
    const target = findMergeTarget(godDiv);
    if (target) performMerge(godDiv, target);
    
    dragged = null;
    recalculateSynergy();
  }

  document.addEventListener('pointermove', move);
  document.addEventListener('pointerup', end);
}

function findMergeTarget(draggedDiv) {
  for (let g of placedGods) {
    if (g.element === draggedDiv) continue;
    if (g.data.id === draggedDiv.godData.id && g.currentRank === draggedDiv.currentRank) {
      const dx = g.element.offsetLeft - draggedDiv.offsetLeft;
      const dy = g.element.offsetTop - draggedDiv.offsetTop;
      if (Math.hypot(dx, dy) < 100) return g.element;
    }
  }
  return null;
}

function performMerge(aDiv, bDiv) {
  const aData = aDiv.godData;

  // === 追加要素：フードゴット・根源を3体組み合わせ ===
  if (aData.id === "food_god_genesis") {
    const genesisCount = placedGods.filter(g => g.data.id === "food_god_genesis").length;
    if (genesisCount >= 3) {
      removeGod(aDiv);
      removeGod(bDiv);
      const third = placedGods.find(g => g.data.id === "food_god_genesis");
      if (third) removeGod(third.element);

      const randomSS = secretS[Math.floor(Math.random() * secretS.length)];
      const newDiv = spawnGod(randomSS, aDiv.offsetLeft, aDiv.offsetTop);
      playMergeEffects(newDiv);
      showMergePopup(randomSS.displayName);
      return;
    }
  }

  // 通常進化
  const nextData = getGodById(aData.nextEvolutionId);
  if (!nextData) return;

  removeGod(bDiv);
  aDiv.godData = nextData;
  aDiv.currentRank = nextData.rank || (aDiv.currentRank + 1);
  aDiv.innerHTML = createGodElementHTML(nextData, aDiv.currentRank);
  aDiv.godData = nextData;

  playMergeEffects(aDiv);
  showMergePopup(nextData.displayName);
}

// マージ演出（光の柱・粒子・画面揺れ・太陽光エフェクト完全再現）
function playMergeEffects(div) {
  flashEl.style.transition = 'none';
  flashEl.style.opacity = '0.9';
  setTimeout(() => {
    flashEl.style.transition = 'opacity 0.3s ease';
    flashEl.style.opacity = '0';
  }, 120);

  // 画面揺れ
  boardEl.style.transition = 'transform 0.2s ease';
  boardEl.style.transform = `translate(${Math.random()*12-6}px, ${Math.random()*8-4}px)`;
  setTimeout(() => {
    boardEl.style.transform = '';
    boardEl.style.transition = '';
  }, 220);

  // スポーンバウンス
  div.classList.add('spawn');
  setTimeout(() => div.classList.remove('spawn'), 650);
}

function createGodElementHTML(godData, rank) {
  return `
    <div style="font-size:34px; margin-bottom:2px;">${getEmoji(godData)}</div>
    <div style="font-size:11px; font-weight:700;">${godData.displayName}</div>
    <div style="font-size:9px; color:#aaa;">RANK ${rank}</div>
  `;
}

function removeGod(div) {
  const idx = placedGods.findIndex(g => g.element === div);
  if (idx !== -1) placedGods.splice(idx, 1);
  div.remove();
}

// ==================== シナジー（光の線演出付き） ====================
function recalculateSynergy() {
  // 既存の線を削除
  document.querySelectorAll('.synergy-line').forEach(el => el.remove());

  let multiplier = 1.0;
  const tagCount = {};

  placedGods.forEach(g => {
    g.data.synergyTags.forEach(tag => tagCount[tag] = (tagCount[tag] || 0) + 1);
  });

  Object.keys(tagCount).forEach(tag => {
    if (tagCount[tag] >= 2) multiplier *= 1.3;
  });

  synergyMultiplier = Math.max(1, multiplier);
  updateUI();

  // シナジー光の線（視覚演出）
  if (multiplier > 1.3) {
    // 簡易的に2体を線で結ぶ（実際は複数対応可能）
    if (placedGods.length >= 2) {
      const a = placedGods[0].element;
      const b = placedGods[1].element;
      drawSynergyLine(a, b);
    }
  }
}

function drawSynergyLine(a, b) {
  const line = document.createElement('div');
  line.className = 'synergy-line';
  // 簡易線（実際はより精密に計算可能）
  line.style.left = `${Math.min(a.offsetLeft, b.offsetLeft) + 46}px`;
  line.style.top = `${Math.min(a.offsetTop, b.offsetTop) + 46}px`;
  line.style.width = `${Math.hypot(a.offsetLeft - b.offsetLeft, a.offsetTop - b.offsetTop)}px`;
  line.style.transform = `rotate(${Math.atan2(b.offsetTop - a.offsetTop, b.offsetLeft - a.offsetLeft) * 180 / Math.PI}deg)`;
  boardEl.appendChild(line);
  setTimeout(() => line.remove(), 2500);
}

// ==================== ガチャ（時間別 + SecretZ追加） ====================
function openGacha(type) {
  if (type === 'secretz') {
    const h = new Date().getHours();
    const okTime = (h >= 6 && h < 8) || (h >= 17 && h < 20);
    if (!okTime) { alert('6:00〜8:00 / 17:00〜20:00のみ'); return; }
    if (currency < 1000) { alert('資金がK単位以上必要'); return; }

    const genesis = placedGods.filter(g => g.data.id === "food_god_genesis").length;
    if (genesis < 10) { alert('フードゴット・根源が10体必要'); return; }

    // 10体消費 + 全資金消費
    for (let i = 0; i < 10; i++) {
      const g = placedGods.find(x => x.data.id === "food_god_genesis");
      if (g) removeGod(g.element);
    }
    currency = 0;

    const result = secretZPool[Math.floor(Math.random() * secretZPool.length)];
    const div = spawnGod(result, 380, 300);
    playMergeEffects(div);
    showGachaResult(result.displayName);
    return;
  }

  const isMorning = new Date().getHours() < 12;
  const cost = isMorning ? 1000 : 100000;
  if (currency < cost) return;
  currency -= cost;

  let pool = Object.values(allGods).filter(g => g.availableInNormalGacha !== false);
  if (!isMorning) pool = [...pool, ...limitedPool];

  const result = pool[Math.floor(Math.random() * pool.length)];
  const div = spawnGod(result, 250 + Math.random()*400, 180 + Math.random()*350);
  playSpawnBounce(div);
  showGachaResult(result.displayName);
}

function showGachaResult(name) {
  document.getElementById('gacha-name').textContent = name;
  document.getElementById('gacha-result').classList.add('show');
}

// ==================== UI更新・ユーティリティ ====================
function updateUI() {
  document.getElementById('currency').textContent = formatNumber(currency);
  document.getElementById('umami').textContent = formatNumber(umami);
  document.getElementById('persec').textContent = formatNumber(Math.floor(perSecondGain * synergyMultiplier));
  document.getElementById('tapgain').textContent = formatNumber(tapGain);
  document.getElementById('synergy').textContent = synergyMultiplier.toFixed(2);
}

function addCurrency(v) { currency += v; updateUI(); }
function addUmami(v) { umami += v; updateUI(); }

function formatNumber(n) {
  if (n < 1000) return n;
  const s = ["", "K", "M", "B", "T"];
  let i = 0; while (n >= 1000 && i < 4) { n /= 1000; i++; }
  return n.toFixed(n >= 100 ? 0 : 1) + s[i];
}

function showFloatingText(text, big = false, parent = null) {
  const el = document.createElement('div');
  el.className = 'floating-text';
  el.style.color = big ? '#ffd700' : '#22ff88';
  el.style.fontSize = big ? '26px' : '18px';
  el.textContent = text;

  if (parent) {
    const r = parent.getBoundingClientRect();
    const br = boardEl.getBoundingClientRect();
    el.style.left = (r.left - br.left + 30) + 'px';
    el.style.top = (r.top - br.top - 15) + 'px';
  } else {
    el.style.left = '48%';
    el.style.top = '42%';
  }
  boardEl.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function closePopup(id) {
  document.getElementById(id).classList.remove('show');
}

function playSpawnBounce(div) {
  div.classList.add('spawn');
  setTimeout(() => div.classList.remove('spawn'), 650);
}
