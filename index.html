<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>フードゴット・根源</title>
  <style>
    :root{
      --bg1:#fff8ef;
      --bg2:#fde9c8;
      --ink:#4a2f20;
      --gold:#f5c85c;
      --gold-deep:#d89a16;
      --rare:#58a6ff;
      --ur:#d36cff;
      --secret:#ffd700;
      --board:#f6dfb4;
      --wood:#b98143;
      --danger:#ff6b6b;
      --ok:#77c56b;
      --panel:rgba(255,255,255,0.8);
      --shadow:0 8px 24px rgba(0,0,0,0.18);
      --panel2:rgba(255,255,255,0.92);
      --line:rgba(90,50,15,0.18);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
    html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;color:var(--ink);background:radial-gradient(circle at 50% 20%, #fff6d4 0, #ffefbf 20%, transparent 35%),linear-gradient(180deg,var(--bg1),var(--bg2))}
    button{font:inherit}
    #app{width:100%;height:100%;position:relative;overflow:hidden}
    .hidden{display:none!important}
    .screen{position:absolute;inset:0;width:100%;height:100%}
    .title-screen{
      display:flex;flex-direction:column;justify-content:center;align-items:center;
      padding:24px;background:radial-gradient(circle at center, rgba(255,255,220,0.95), rgba(255,230,180,0.95)),linear-gradient(180deg,#fffaf0,#f7dfb9);
    }
    .title-logo{
      font-size:clamp(28px,7vw,48px);font-weight:900;text-align:center;line-height:1.15;color:#7a3d00;
      text-shadow:0 3px 0 #fff,0 6px 18px rgba(255,180,0,0.45);margin-bottom:14px;
    }
    .title-sub{font-size:14px;opacity:0.85;margin-bottom:26px;text-align:center}
    .menu-buttons{width:min(92vw,360px);display:flex;flex-direction:column;gap:12px}
    .btn{
      border:none;border-radius:18px;padding:14px 18px;font-size:16px;font-weight:800;color:#4b2d1c;
      background:linear-gradient(180deg,#fff3cb,#f5c85c);box-shadow:0 5px 0 #d39f2c,0 8px 18px rgba(0,0,0,0.15);cursor:pointer;
      transition:transform 0.08s ease,box-shadow 0.08s ease,filter 0.15s ease;
    }
    .btn:active,.btn.pressed{transform:translateY(4px) scale(0.98);box-shadow:0 1px 0 #d39f2c,0 3px 10px rgba(0,0,0,0.12)}
    .btn.secondary{background:linear-gradient(180deg,#fff,#e8e8e8);box-shadow:0 5px 0 #bdbdbd,0 8px 18px rgba(0,0,0,0.12)}
    .game-screen{display:grid;grid-template-rows:auto auto 1fr auto;width:100%;height:100%;position:relative}
    .top-bar{padding:10px 12px 6px;display:grid;grid-template-columns:1fr 1fr;gap:8px;position:relative;z-index:10}
    .stat-card{background:rgba(255,255,255,0.78);border:2px solid rgba(255,255,255,0.55);border-radius:16px;box-shadow:var(--shadow);padding:10px 12px;backdrop-filter:blur(5px)}
    .stat-title{font-size:12px;opacity:0.8;margin-bottom:4px}
    .stat-value{font-size:18px;font-weight:900}
    .sub-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 12px 8px;position:relative;z-index:10}
    .sub-pill{padding:8px 10px;border-radius:999px;background:rgba(255,255,255,0.8);text-align:center;font-size:12px;font-weight:700;box-shadow:var(--shadow)}
    .main-area{position:relative;overflow:hidden;padding:8px 10px 10px;display:flex;flex-direction:column;gap:8px}
    .tap-area{
      position:relative;border-radius:28px;flex:0 0 24%;min-height:130px;
      background:radial-gradient(circle at center, rgba(255,255,255,0.92), rgba(255,235,190,0.95)),linear-gradient(180deg,#fff7dd,#ffe7a2);
      box-shadow:inset 0 -10px 30px rgba(255,200,70,0.18),var(--shadow);border:2px solid rgba(255,255,255,0.7);
      display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;
    }
    .tap-core{
      width:120px;height:120px;border-radius:50%;
      background:radial-gradient(circle at 35% 30%, #fffef6 0, #ffe89f 45%, #f8c93c 70%, #e5a412 100%);
      box-shadow:0 0 30px rgba(255,230,120,0.7),0 0 70px rgba(255,220,70,0.35);
      display:flex;align-items:center;justify-content:center;font-size:46px;transform:scale(1);transition:transform 0.08s ease;
    }
    .tap-core.tapped{transform:scale(0.92)}
    .tap-label{position:absolute;bottom:10px;font-weight:900;font-size:16px;color:#8b4e00;text-shadow:0 2px 0 rgba(255,255,255,0.8)}
    .board-area{
      position:relative;flex:1;border-radius:24px;background:radial-gradient(circle at center, rgba(255,255,255,0.35), transparent 60%),linear-gradient(180deg,#f2deb5,#e9ca92);
      box-shadow:inset 0 0 0 4px rgba(255,255,255,0.35),var(--shadow);overflow:hidden;touch-action:none;
    }
    .board-title{position:absolute;top:8px;left:12px;font-size:13px;font-weight:900;color:rgba(90,50,15,0.85);z-index:2}
    .god{
      position:absolute;width:78px;height:90px;border-radius:20px;background:rgba(255,255,255,0.68);box-shadow:0 8px 18px rgba(0,0,0,0.18);
      display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:4px;overflow:visible;transition:transform 0.12s ease,box-shadow 0.12s ease,opacity 0.12s ease;
    }
    .god.dragging{opacity:0.72;transform:scale(1.08);z-index:999}
    .god.highlight{box-shadow:0 0 0 4px rgba(255,255,255,0.9),0 0 24px rgba(255,220,90,0.95),0 0 44px rgba(255,200,0,0.55)}
    .god-secret{box-shadow:0 0 18px rgba(255,240,120,0.65),0 0 40px rgba(255,210,50,0.45),0 8px 18px rgba(0,0,0,0.22)}
    .god-emoji{
      width:58px;height:58px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:38px;line-height:1;
    }
    .god-name{font-size:10px;font-weight:800;text-align:center;padding:2px 4px 0;line-height:1.1}
    .god-rarity{font-size:9px;font-weight:900;margin-top:1px}
    .rarity-common{color:#666}
    .rarity-rare{color:#3978ff}
    .rarity-ultrarare{color:#b236f2}
    .rarity-secret{color:#b88b00}
    .aura{position:absolute;inset:-10px;border-radius:24px;opacity:0.28;filter:blur(8px);pointer-events:none}
    .synergy-line{
      position:absolute;height:4px;background:linear-gradient(90deg, rgba(255,255,255,0.2), rgba(255,235,130,0.95), rgba(255,255,255,0.2));
      transform-origin:left center;border-radius:999px;box-shadow:0 0 12px rgba(255,230,120,0.8);pointer-events:none;z-index:1;opacity:0.9;
    }
    .synergy-label{
      position:absolute;padding:6px 10px;background:rgba(255,253,234,0.96);border:2px solid rgba(255,220,120,0.9);border-radius:999px;
      font-size:11px;font-weight:900;box-shadow:var(--shadow);pointer-events:none;z-index:50;animation:synergyFade 1.2s ease forwards;
    }
    @keyframes synergyFade{0%{transform:translateY(8px) scale(0.8);opacity:0}20%{transform:translateY(0) scale(1);opacity:1}80%{transform:translateY(-6px) scale(1);opacity:1}100%{transform:translateY(-16px) scale(0.94);opacity:0}}
    .bottom-ui{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 10px 10px;position:relative;z-index:10}
    .gacha-card,.action-card{background:rgba(255,255,255,0.8);border-radius:18px;box-shadow:var(--shadow);padding:8px;min-height:118px;display:flex;flex-direction:column;justify-content:space-between}
    .gacha-cover-wrap{display:grid;grid-template-columns:78px 1fr;gap:8px;align-items:center}
    .gacha-cover{width:78px;height:78px;border-radius:14px;object-fit:cover;background:rgba(255,255,255,0.4);box-shadow:inset 0 0 0 2px rgba(255,255,255,0.5)}
    .gacha-meta{display:flex;flex-direction:column;gap:4px}
    .gacha-title{font-size:13px;font-weight:900}
    .gacha-desc{font-size:11px;opacity:0.8;line-height:1.3}
    .gacha-cost{font-size:13px;font-weight:900;color:#8b2d00}
    .tiny-row{display:flex;gap:6px;flex-wrap:wrap}
    .tiny-btn{flex:1;min-width:0;font-size:12px;padding:10px 8px;border-radius:14px}
    .floating-number{
      position:absolute;font-weight:900;pointer-events:none;z-index:40;text-shadow:0 2px 0 rgba(255,255,255,0.9);animation:floatUp 0.85s ease-out forwards;white-space:nowrap;
    }
    @keyframes floatUp{0%{transform:translate(-50%,0) scale(0.8);opacity:0}15%{transform:translate(-50%,-8px) scale(1.08);opacity:1}100%{transform:translate(-50%,-52px) scale(1);opacity:0}}
    .flash-overlay,.rare-overlay,.merge-beam,.sunburst,.screen-dim{position:absolute;inset:0;pointer-events:none}
    .flash-overlay{background:rgba(255,255,255,0);z-index:60}
    .flash-overlay.active{animation:flashPulse 0.35s ease}
    @keyframes flashPulse{0%{background:rgba(255,255,255,0)}30%{background:rgba(255,255,255,0.65)}100%{background:rgba(255,255,255,0)}}
    .rare-overlay.active{background:linear-gradient(120deg,transparent 0,rgba(255,255,255,0.0) 35%,rgba(255,255,255,0.7) 50%,rgba(255,255,255,0.0) 65%,transparent 100%);animation:rareSweep 0.6s ease;z-index:62}
    @keyframes rareSweep{0%{transform:translateX(-100%);opacity:0.2}30%{opacity:1}100%{transform:translateX(100%);opacity:0}}
    .merge-beam{z-index:58;display:none;background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,245,180,0.95),rgba(255,255,255,0));opacity:0}
    .merge-beam.active{display:block;animation:beamFlash 0.55s ease}
    @keyframes beamFlash{0%{opacity:0}20%{opacity:0.95}100%{opacity:0}}
    .sunburst{z-index:57;display:none;opacity:0;background:radial-gradient(circle at center, rgba(255,249,190,0.9) 0, rgba(255,232,122,0.55) 18%, rgba(255,215,0,0.14) 35%, transparent 58%)}
    .sunburst.active{display:block;animation:sunburstPulse 0.8s ease}
    @keyframes sunburstPulse{0%{opacity:0;transform:scale(0.6)}35%{opacity:1;transform:scale(1.05)}100%{opacity:0;transform:scale(1.4)}}
    .shake{animation:screenShake 0.3s ease}
    @keyframes screenShake{
      0%{transform:translate(0,0)}20%{transform:translate(-3px,1px)}40%{transform:translate(3px,-1px)}
      60%{transform:translate(-2px,1px)}80%{transform:translate(2px,-1px)}100%{transform:translate(0,0)}
    }
    .popup-layer{position:absolute;inset:0;z-index:100;pointer-events:none}
    .screen-dim{background:rgba(48,26,8,0.45);opacity:0;transition:opacity 0.2s ease}
    .screen-dim.show{opacity:1;pointer-events:auto}
    .popup{
      position:absolute;left:50%;top:50%;transform:translate(-50%,100vh) scale(0.9);width:min(92vw,420px);border-radius:24px;
      box-shadow:0 18px 40px rgba(0,0,0,0.3);opacity:0;transition:transform 0.28s ease,opacity 0.28s ease;pointer-events:auto;overflow:hidden;
    }
    .popup.show{transform:translate(-50%,-50%) scale(1);opacity:1}
    .wood-popup{background:linear-gradient(180deg,#f7e4bb,#ebcc90);border:8px solid #b57a3f}
    .popup-header{padding:14px 16px 8px;font-size:20px;font-weight:900;text-align:center;color:#6d3600}
    .popup-body{padding:8px 14px 16px}
    .merge-spotlight{
      position:relative;height:220px;border-radius:18px;background:radial-gradient(circle at center, rgba(255,255,255,0.95), rgba(255,233,150,0.85), rgba(255,204,80,0.38), transparent 75%);overflow:hidden;
    }
    .merge-name{
      position:absolute;left:50%;bottom:14px;transform:translateX(-50%);padding:8px 14px;border-radius:999px;background:rgba(255,255,255,0.92);
      font-weight:900;font-size:18px;box-shadow:var(--shadow);white-space:nowrap;
    }
    .merge-result-emoji,.merge-result-img{
      position:absolute;left:50%;top:46%;transform:translate(-50%,-50%) scale(0.5);width:132px;height:132px;object-fit:contain;opacity:0;
      animation:revealMergeResult 0.55s ease forwards;
    }
    .merge-result-emoji{display:flex;align-items:center;justify-content:center;font-size:94px}
    @keyframes revealMergeResult{0%{transform:translate(-50%,-50%) scale(0.4);opacity:0}50%{transform:translate(-50%,-50%) scale(1.14);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
    .reward-text{text-align:center;font-size:22px;font-weight:900;color:#8a2500;text-shadow:0 3px 0 rgba(255,255,255,0.9);margin:8px 0 14px;animation:rewardPop 0.35s ease}
    @keyframes rewardPop{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}
    .detail-grid{display:grid;grid-template-columns:92px 1fr;gap:12px;align-items:start}
    .detail-img,.detail-emoji{width:92px;height:92px;border-radius:16px;background:rgba(255,255,255,0.4)}
    .detail-img{object-fit:contain}
    .detail-emoji{display:flex;align-items:center;justify-content:center;font-size:64px}
    .detail-list{font-size:13px;line-height:1.7}
    .notice-text,.challenge-text{font-size:14px;line-height:1.7;background:rgba(255,255,255,0.55);padding:12px;border-radius:14px}
    .footer-actions{display:flex;gap:8px;margin-top:14px}
    .footer-actions .btn{flex:1;font-size:14px;padding:12px 10px}
    .mini-note{font-size:11px;opacity:0.74;margin-top:4px;line-height:1.4}
    .glow-big{animation:glowBig 0.5s ease}
    @keyframes glowBig{0%{filter:brightness(1)}50%{filter:brightness(1.45)}100%{filter:brightness(1)}}
    .text-gold{color:#a66200}
    .text-secret{color:#8e6a00;text-shadow:0 0 8px rgba(255,220,50,0.7)}
    .longpress-ring{
      position:absolute;width:64px;height:64px;border:4px solid rgba(255,255,255,0.9);border-top-color:rgba(255,220,70,1);border-radius:50%;
      pointer-events:none;z-index:70;animation:spin 0.7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .small-tag{font-size:11px;opacity:0.8}
  </style>
</head>
<body>
<div id="app">
  <div id="flashOverlay" class="flash-overlay"></div>
  <div id="rareOverlay" class="rare-overlay"></div>
  <div id="mergeBeam" class="merge-beam"></div>
  <div id="sunburst" class="sunburst"></div>

  <section id="titleScreen" class="screen title-screen">
    <div class="title-logo">フードゴット・根源</div>
    <div class="title-sub">タップでうまみを集め、根源を重ねて神格へ。</div>
    <div class="menu-buttons">
      <button id="startBtn" class="btn">はじめる</button>
      <button id="noticeBtn" class="btn secondary">お知らせ</button>
      <button id="challengeBtn" class="btn secondary">キャラ一覧</button>
      <button id="resetBtn" class="btn secondary">データ初期化</button>
    </div>
  </section>

  <section id="gameScreen" class="screen game-screen hidden">
    <div class="top-bar">
      <div class="stat-card">
        <div class="stat-title">フードゴット資金</div>
        <div id="currencyValue" class="stat-value">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">所持金</div>
        <div id="yenValue" class="stat-value">¥0</div>
      </div>
    </div>

    <div class="sub-bar">
      <div class="sub-pill">生産: <span id="productionValue">0</span>/s</div>
      <div class="sub-pill">タップ: <span id="tapValue">1</span></div>
      <div class="sub-pill">倍率: <span id="synergyValue">x1.00</span></div>
    </div>

    <div class="main-area">
      <div id="tapArea" class="tap-area">
        <div id="tapCore" class="tap-core">🍚</div>
        <div class="tap-label">タップでうまみ獲得</div>
      </div>

      <div id="boardArea" class="board-area">
        <div class="board-title">配置エリア（ドラッグで移動・重ねると進化）</div>
      </div>
    </div>

    <div class="bottom-ui">
      <div class="gacha-card">
        <div class="gacha-cover-wrap">
          <div style="width:78px;height:78px;border-radius:14px;background:linear-gradient(180deg,#fff,#f2d28f);display:flex;align-items:center;justify-content:center;font-size:36px;">🎲</div>
          <div class="gacha-meta">
            <div id="gachaTitle" class="gacha-title">通常ガチャ</div>
            <div id="gachaDesc" class="gacha-desc">資金で引ける通常召喚。</div>
            <div id="gachaCost" class="gacha-cost">¥1,000</div>
          </div>
        </div>
        <div class="tiny-row">
          <button id="summonBtn" class="btn tiny-btn">召喚</button>
          <button id="saveBtn" class="btn secondary tiny-btn">保存</button>
        </div>
      </div>

      <div class="action-card">
        <div class="gacha-meta">
          <div class="gacha-title">シークレット案内</div>
          <div class="gacha-desc">根源3組み合わせでシークレットS、KB到達後は時間帯でZガチャが出現。</div>
          <div class="mini-note">6:00〜8:00 / 17:00〜20:00 に表示。</div>
        </div>
        <div class="tiny-row">
          <button id="backTitleBtn" class="btn secondary tiny-btn">タイトルへ</button>
          <button id="todayGodBtn" class="btn tiny-btn">本日特典</button>
        </div>
      </div>
    </div>
  </section>

  <div class="popup-layer">
    <div id="screenDim" class="screen-dim"></div>

    <div id="mergePopup" class="popup wood-popup hidden">
      <div class="popup-header">進化</div>
      <div class="popup-body">
        <div class="reward-text">合体成功！</div>
        <div class="merge-spotlight">
          <img id="mergeResultImg" class="merge-result-img hidden" src="" alt="merge result">
          <div id="mergeResultEmoji" class="merge-result-emoji hidden"></div>
          <div id="mergeResultName" class="merge-name"></div>
        </div>
        <div class="footer-actions">
          <button id="mergeCloseBtn" class="btn">閉じる</button>
        </div>
      </div>
    </div>

    <div id="detailPopup" class="popup wood-popup hidden">
      <div class="popup-header">キャラ詳細</div>
      <div class="popup-body">
        <div class="detail-grid">
          <img id="detailImg" class="detail-img hidden" src="" alt="detail image">
          <div id="detailEmoji" class="detail-emoji hidden"></div>
          <div id="detailList" class="detail-list"></div>
        </div>
        <div class="footer-actions">
          <button id="detailCloseBtn" class="btn">閉じる</button>
        </div>
      </div>
    </div>

    <div id="noticePopup" class="popup wood-popup hidden">
      <div class="popup-header">お知らせ</div>
      <div class="popup-body">
        <div class="notice-text" id="noticeText"></div>
        <div class="footer-actions">
          <button id="noticeCloseBtn" class="btn">閉じる</button>
        </div>
      </div>
    </div>

    <div id="challengePopup" class="popup wood-popup hidden">
      <div class="popup-header">キャラ一覧</div>
      <div class="popup-body">
        <div id="challengeText" class="challenge-text"></div>
        <div class="footer-actions">
          <button id="challengeCloseBtn" class="btn">閉じる</button>
        </div>
      </div>
    </div>

    <div id="loginBoard" class="login-board hidden">
      <div class="board-header">ログインボーナス</div>
      <div class="board-content">
        <div class="bonus-box">
          <div id="loginRewardText" class="reward-text"></div>
          <div id="loginRewardDetail" class="notice-text" style="font-size:13px;margin:0;"></div>
          <div id="loginStamp" class="stamp">GET</div>
        </div>
        <div class="footer-actions" style="margin-top:12px;">
          <button id="loginCloseBtn" class="btn">閉じる</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
class Util {
  static clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }
  static dist(ax,ay,bx,by){ const dx=ax-bx, dy=ay-by; return Math.sqrt(dx*dx+dy*dy); }
  static formatNumber(num){
    if(!isFinite(num)) return "0";
    const units = ["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","De"];
    let value = Math.abs(Math.floor(num));
    let unit = 0;
    while(value >= 1000 && unit < units.length-1){ value /= 1000; unit++; }
    const sign = num < 0 ? "-" : "";
    const fixed = value >= 100 ? 0 : value >= 10 ? 1 : 2;
    return sign + value.toFixed(fixed) + units[unit];
  }
  static formatYen(num){ return "¥" + Math.floor(num).toLocaleString("ja-JP"); }
  static todayKey(){
    const d = new Date();
    return [d.getFullYear(),String(d.getMonth()+1).padStart(2,"0"),String(d.getDate()).padStart(2,"0")].join("-");
  }
  static nowHour(){ return new Date().getHours(); }
  static randomChoice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  static chance(weightedList){
    const total = weightedList.reduce((a,b)=>a+b.weight,0);
    let roll = Math.random()*total;
    for(const item of weightedList){ roll -= item.weight; if(roll <= 0) return item; }
    return weightedList[weightedList.length-1];
  }
  static sanitizeKey(str){ return String(str).toLowerCase().replace(/[^a-z0-9]+/g,""); }
}
class SaveManager {
  static get KEY(){ return "foodgod_origin_save_v1"; }
  static save(data){ localStorage.setItem(this.KEY, JSON.stringify(data)); }
  static load(){ try{ const raw=localStorage.getItem(this.KEY); return raw ? JSON.parse(raw) : null; }catch(e){ return null; } }
  static clear(){ localStorage.removeItem(this.KEY); }
  static calcOfflineReward(lastTime, productionPerSec){
    if(!lastTime) return 0;
    const now = Date.now();
    const deltaSec = Math.max(0,(now-lastTime)/1000);
    const capped = Math.min(deltaSec, 60*60*4);
    return Math.floor(productionPerSec * capped * 0.35);
  }
}
class AudioManager {
  constructor(){ this.ctx=null; }
  ensure(){ if(!this.ctx){ const Ctx = window.AudioContext || window.webkitAudioContext; if(Ctx) this.ctx = new Ctx(); } }
  beep(freq=440,duration=0.06,type="sine",gainValue=0.03){
    this.ensure(); if(!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type; osc.frequency.value = freq; gain.gain.value = gainValue;
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
    osc.stop(this.ctx.currentTime + duration);
  }
  tap(){ this.beep(700,0.05,"triangle",0.025); }
  place(){ this.beep(520,0.08,"sine",0.03); }
  merge(){ this.beep(880,0.12,"sawtooth",0.035); setTimeout(()=>this.beep(1040,0.18,"triangle",0.028),50); }
  rare(){ this.beep(1100,0.15,"triangle",0.04); setTimeout(()=>this.beep(1380,0.22,"sine",0.03),80); }
  secret(){ this.beep(330,0.18,"sawtooth",0.05); setTimeout(()=>this.beep(660,0.22,"triangle",0.04),100); setTimeout(()=>this.beep(1320,0.3,"sine",0.03),180); }
  button(){ this.beep(430,0.05,"square",0.02); }
  stamp(){ this.beep(220,0.08,"square",0.04); }
}
class PopupController {
  constructor(dim){ this.dim=dim; }
  show(popup){ this.dim.classList.add("show"); popup.classList.remove("hidden"); requestAnimationFrame(()=>popup.classList.add("show")); }
  hide(popup){ popup.classList.remove("show"); setTimeout(()=>popup.classList.add("hidden"),220); if(!document.querySelectorAll(".popup.show").length && document.getElementById("loginBoard").classList.contains("hidden")) this.dim.classList.remove("show"); }
  showDim(){ this.dim.classList.add("show"); }
  hideDimIfPossible(){
    const anyPopupOpen = document.querySelectorAll(".popup.show").length > 0;
    const loginBoard = document.getElementById("loginBoard");
    const loginOpen = !loginBoard.classList.contains("hidden");
    if(!anyPopupOpen && !loginOpen) this.dim.classList.remove("show");
  }
}
class ButtonFeedback {
  static bindAll(audio){
    document.querySelectorAll(".btn").forEach(btn=>{
      btn.addEventListener("pointerdown",()=>{ btn.classList.add("pressed"); audio.button(); });
      const clear = ()=>btn.classList.remove("pressed");
      btn.addEventListener("pointerup",clear);
      btn.addEventListener("pointercancel",clear);
      btn.addEventListener("pointerleave",clear);
    });
  }
}
class RareEffectController {
  constructor(audio){
    this.audio=audio;
    this.flashOverlay=document.getElementById("flashOverlay");
    this.rareOverlay=document.getElementById("rareOverlay");
    this.mergeBeam=document.getElementById("mergeBeam");
    this.sunburst=document.getElementById("sunburst");
    this.app=document.getElementById("app");
  }
  flash(){ this.flashOverlay.classList.remove("active"); void this.flashOverlay.offsetWidth; this.flashOverlay.classList.add("active"); }
  rareSweep(){ this.rareOverlay.classList.remove("active"); void this.rareOverlay.offsetWidth; this.rareOverlay.classList.add("active"); }
  mergeBurst(){ this.mergeBeam.classList.remove("active"); this.sunburst.classList.remove("active"); void this.mergeBeam.offsetWidth; this.mergeBeam.classList.add("active"); this.sunburst.classList.add("active"); this.app.classList.add("shake"); setTimeout(()=>this.app.classList.remove("shake"),320); }
  playSummon(rarity){
    if(rarity==="UltraRare"){ this.rareSweep(); this.audio.rare(); }
    else if(rarity==="Secret"){ this.flash(); setTimeout(()=>this.flash(),90); this.rareSweep(); this.audio.secret(); }
    else if(rarity==="Rare"){ this.audio.rare(); }
  }
  playMerge(rarity){ this.mergeBurst(); if(rarity==="Secret") this.audio.secret(); else this.audio.merge(); }
}

  constructor(){
    this.definitions = [
      {name:"麺シナジー", tagsA:["noodle"], tagsB:["noodle"], multiplier:1.35},
      {name:"和食シナジー", tagsA:["japanese"], tagsB:["japanese"], multiplier:1.45},
      {name:"朝食シナジー", tagsA:["morning"], tagsB:["morning"], multiplier:1.4},
      {name:"海シナジー", tagsA:["sea"], tagsB:["sea"], multiplier:1.38},
      {name:"甘味シナジー", tagsA:["sweet"], tagsB:["sweet"], multiplier:1.32},
      {name:"根源覚醒", tagsA:["secret_s"], tagsB:["secret_s"], multiplier:1.7}
    ];
  }
  hasAllTags(god,tags){ return tags.every(t=>god.synergyTags.includes(t)); }
  calculate(instances,godDb,distanceThreshold=110){
    const activePairs=[]; let multiplier=1;
    for(let i=0;i<instances.length;i++)for(let j=i+1;j<instances.length;j++){
      const a=instances[i], b=instances[j], godA=godDb.get(a.godId), godB=godDb.get(b.godId);
      if(!godA || !godB) continue;
      if(Util.dist(a.x,a.y,b.x,b.y) > distanceThreshold) continue;
      for(const def of this.definitions){
        const aMatch = this.hasAllTags(godA, def.tagsA) && this.hasAllTags(godB, def.tagsB);
        const bMatch = this.hasAllTags(godB, def.tagsA) && this.hasAllTags(godA, def.tagsB);
        if(aMatch || bMatch){
          activePairs.push({name:def.name, ax:a.x, ay:a.y, bx:b.x, by:b.y});
          multiplier *= def.multiplier;
          break;
        }
      }
    }
    return {multiplier:Math.min(multiplier,25), activePairs};
  }
}
class MergeSystem {
  constructor(godDb){ this.godDb=godDb; }
  canMerge(a,b){
    if(!a || !b) return false;
    const ga = this.godDb.get(a.godId), gb = this.godDb.get(b.godId);
    return ga && gb && ga.id !== gb.id && ga.rank === gb.rank && !!ga.evolveTo && ga.evolveTo === gb.evolveTo;
  }
  merge(a,b){
    const base = this.godDb.get(a.godId);
    if(!base || !base.evolveTo) return null;
    const evolved = this.godDb.get(base.evolveTo);
    if(!evolved) return null;
    return {newGodId:evolved.id, x:(a.x+b.x)/2, y:(a.y+b.y)/2, data:evolved};
  }
}
class GachaSystem {
  constructor(godDb){
    this.godDb = godDb;
    this.initialYen = 50000;
  }
  getCurrentBanner(){
    const h = Util.nowHour();
    const isMorning = h >= 6 && h < 8;
    const isEvening = h >= 17 && h < 20;
    if(isMorning || isEvening){
      return {
        type:"secretZ",
        title:"シークレットZガチャ",
        imageKey:null,
        cost:0,
        description:"KB到達ユーザー向け。フードゴット・根源10個で引ける特別枠。引くと所持資金は全て消費されます。",
        pool:this.godDb.getAll().filter(g=>g.rarity==="Secret")
      };
    }
    return {
      type:"normal",
      title:"通常ガチャ",
      imageKey:null,
      cost:1000,
      description:"通常召喚。",
      pool:this.godDb.getAll().filter(g=>g.rarity!=="Secret")
    };
  }
  summon(){ const banner=this.getCurrentBanner(); return {banner, god:Util.randomChoice(banner.pool)}; }
}

class BoardAreaManager {
  constructor(boardEl,godDb,popupController,audio){
    this.boardEl=boardEl; this.godDb=godDb; this.popupController=popupController; this.audio=audio;
    this.instances=[]; this.uidCounter=1; this.elements=new Map(); this.onDragEnd=null;
  }
  setInstances(raw){ this.instances=raw.map(r=>({uid:r.uid,godId:r.godId,x:r.x,y:r.y})); this.uidCounter=Math.max(1,...this.instances.map(i=>i.uid),0)+1; this.renderAll(); }
  serialize(){ return this.instances.map(i=>({uid:i.uid,godId:i.godId,x:i.x,y:i.y})); }
  addGod(godId,x=null,y=null){
    const rect=this.boardEl.getBoundingClientRect();
    const nx=x!=null?x:60+Math.random()*Math.max(60,rect.width-120);
    const ny=y!=null?y:60+Math.random()*Math.max(80,rect.height-120);
    const inst={uid:this.uidCounter++, godId, x:nx, y:ny};
    this.instances.push(inst); this.createElement(inst); this.audio.place(); return inst;
  }
  removeByUid(uid){
    const idx=this.instances.findIndex(i=>i.uid===uid); if(idx>=0)this.instances.splice(idx,1);
    const el=this.elements.get(uid); if(el) el.remove(); this.elements.delete(uid);
  }
  getByUid(uid){ return this.instances.find(i=>i.uid===uid); }
  renderAll(){ this.boardEl.querySelectorAll(".god,.synergy-line,.synergy-label").forEach(el=>el.remove()); this.elements.clear(); this.instances.forEach(inst=>this.createElement(inst)); }
  clearSynergyLines(){ this.boardEl.querySelectorAll(".synergy-line").forEach(el=>el.remove()); }
  drawSynergyLines(activePairs){
    this.clearSynergyLines();
    activePairs.forEach(pair=>{
      const line=document.createElement("div"); line.className="synergy-line";
      const dx=pair.bx-pair.ax, dy=pair.by-pair.ay, len=Math.sqrt(dx*dx+dy*dy), angle=Math.atan2(dy,dx)*180/Math.PI;
      line.style.left=pair.ax+"px"; line.style.top=pair.ay+"px"; line.style.width=len+"px"; line.style.transform="rotate("+angle+"deg)";
      this.boardEl.appendChild(line);
      const label=document.createElement("div"); label.className="synergy-label"; label.textContent=pair.name; label.style.left=(pair.ax+pair.bx)/2+"px"; label.style.top=(pair.ay+pair.by)/2+"px";
      this.boardEl.appendChild(label); setTimeout(()=>label.remove(),1250);
    });
  }
  createElement(inst){
    const god=this.godDb.get(inst.godId); if(!god) return;
    const el=document.createElement("div"); el.className="god";
    if(god.rarity==="Secret") el.classList.add("god-secret");
    el.dataset.uid=String(inst.uid);
    el.style.left=(inst.x-39)+"px"; el.style.top=(inst.y-45)+"px";
    const aura=document.createElement("div"); aura.className="aura"; aura.style.background = god.auraColor;
    if(god.rarity==="Common") aura.style.opacity=0.15;
    if(god.rarity==="Rare") aura.style.opacity=0.2;
    if(god.rarity==="UltraRare") aura.style.opacity=0.28;
    if(god.rarity==="Secret") aura.style.opacity=0.38;
    el.appendChild(aura);
    const emoji=document.createElement("div"); emoji.className="god-emoji"; emoji.textContent=god.emojiFallback; el.appendChild(emoji);
    const name=document.createElement("div"); name.className="god-name"; name.textContent=god.name; el.appendChild(name);
    const rarity=document.createElement("div"); rarity.className="god-rarity rarity-"+god.rarity.toLowerCase(); rarity.textContent=god.rarity; el.appendChild(rarity);
    this.bindDrag(el,inst);
    this.boardEl.appendChild(el);
    this.elements.set(inst.uid,el);
  }
  updatePosition(inst){ const el=this.elements.get(inst.uid); if(el){ el.style.left=(inst.x-39)+"px"; el.style.top=(inst.y-45)+"px"; } }
  bindDrag(el,inst){
    let dragging=false, offsetX=0, offsetY=0, highlightUid=null;
    const clearHighlight=()=>{ this.instances.forEach(other=>this.elements.get(other.uid)?.classList.remove("highlight")); };
    el.addEventListener("pointerdown",e=>{
      e.preventDefault();
      const rect=el.getBoundingClientRect();
      const boardRect=this.boardEl.getBoundingClientRect();
      offsetX=e.clientX-rect.left;
      offsetY=e.clientY-rect.top;
      el.setPointerCapture(e.pointerId);
      const move=(ev)=>{
        const br=this.boardEl.getBoundingClientRect();
        if(!dragging){ dragging=true; el.classList.add("dragging"); }
        let x=ev.clientX-br.left-offsetX+39;
        let y=ev.clientY-br.top-offsetY+45;
        x=Util.clamp(x,39,br.width-39); y=Util.clamp(y,45,br.height-45);
        inst.x=x; inst.y=y; this.updatePosition(inst);
        highlightUid=null;
        this.instances.forEach(other=>{
          const oe=this.elements.get(other.uid); if(other.uid===inst.uid) return;
          oe?.classList.remove("highlight");
          if(window.game.mergeSystem.canMerge(inst,other) && Util.dist(inst.x,inst.y,other.x,other.y) < 70){ highlightUid=other.uid; oe?.classList.add("highlight"); }
        });
      };
      const up=()=>{
        el.removeEventListener("pointermove",move);
        el.removeEventListener("pointerup",up);
        el.removeEventListener("pointercancel",up);
        el.classList.remove("dragging");
        clearHighlight();
        if(highlightUid!=null) this.onDragEnd?.(inst.uid, highlightUid);
      };
      el.addEventListener("pointermove",move);
      el.addEventListener("pointerup",up);
      el.addEventListener("pointercancel",up);
    });
  }
}

    document.getElementById("tapArea").addEventListener("pointerdown",e=>this.handleTap(e));

    window.addEventListener("beforeunload",()=>this.saveGame());
  }
  enterGame(){ this.titleScreen.classList.add("hidden"); this.gameScreen.classList.remove("hidden"); this.refreshBanner(); }
  backToTitle(){ this.gameScreen.classList.add("hidden"); this.titleScreen.classList.remove("hidden"); }
  showNotice(){
    this.noticeText.innerHTML = `
      <b>追加仕様</b><br>
      ・根源3組み合わせでランダムにシークレットSが出現。<br>
      ・6:00〜8:00、17:00〜20:00はKB到達ユーザーにシークレットZガチャ表示。<br>

      ・タップでうまみポイントが貯まり、50で¥1000へ変換。<br>
      ・数値はK / M / B / T / Qa / Qi / Sx などで省略表示。<br>
    `;
    this.popupController.show(this.noticePopup);
  }
  showChallenge(){
    const list = this.godDb.getAll().map(g=>`${g.name} ｜ ${g.rarity} ｜ ${g.synergyTags.join(", ")}`).join("<br>");
    this.challengeText.innerHTML = list;
    this.popupController.show(this.challengePopup);
  }
  showTodayGodNotice(){
    this.noticeText.innerHTML = `<b>本日特典</b><br>ラーメン系に少し有利な日替わり補正があります。`;
    this.popupController.show(this.noticePopup);
  }
  handleTap(e){
    this.audio.tap();
    this.tapCore.classList.add("tapped");
    setTimeout(()=>this.tapCore.classList.remove("tapped"),80);
    const gain = this.getTapGain();
    this.currency += gain;
    this.currencyUI.setCurrency(this.currency);
    this.spawnFloatingNumber(e.clientX,e.clientY, Util.formatNumber(gain), gain >= 100 ? "#b236f2" : "#8b4e00");
    this.rareEffect.flash();
    this.addUmami(1);
  }
  addUmami(points){
    this.umami = (this.umami || 0) + points;
    while(this.umami >= 50){
      this.umami -= 50;
      this.yen += 1000;
    }
    this.currencyUI.setYen(this.yen);
  }
  getTapGain(){
    let total = this.baseTap;
    this.boardManager.instances.forEach(inst=>{
      const god=this.godDb.get(inst.godId);
      if(!god) return;
      total += god.tapBonus;
      if(this.todayGodBoost && god.id.includes("ramen")) total += Math.floor(god.tapBonus*0.5);
    });
    total *= this.synergyMultiplier;
    return Math.floor(total);
  }
  calculateProduction(){
    let total=0;
    this.boardManager.instances.forEach(inst=>{
      const god=this.godDb.get(inst.godId);
      if(!god) return;
      let value=god.baseProduction;
      if(this.todayGodBoost && god.id.includes("ramen")) value *= 1.25;
      if(god.rarity==="Secret") value *= 1.15;
      total += value;
    });
    const secretCount = this.boardManager.instances.filter(inst => this.godDb.get(inst.godId)?.rarity === "Secret").length;
    if(secretCount > 0) total *= 1 + secretCount * 0.15;
    return total * this.synergyMultiplier;
  }
  recalculateStats(){
    const synergy = this.synergySystem.calculate(this.boardManager.instances, this.godDb);
    this.synergyMultiplier = synergy.multiplier;
    this.productionPerSec = this.calculateProduction();
    this.currencyUI.setProduction(this.productionPerSec);
    this.currencyUI.setTap(this.getTapGain());
    this.currencyUI.setSynergy(this.synergyMultiplier);
    this.boardManager.drawSynergyLines(synergy.activePairs);
    const signature = synergy.activePairs.map(p=>`${p.name}:${p.ax}:${p.ay}:${p.bx}:${p.by}`).sort().join("|");
    if(signature && signature !== this.lastSynergySignature){
      const seen=new Set();
      synergy.activePairs.forEach(pair=>{ if(seen.has(pair.name)) return; seen.add(pair.name); this.boardManager.showSynergyLabel(pair.name,(pair.ax+pair.bx)/2,(pair.ay+pair.by)/2); });
    }
    this.lastSynergySignature = signature;
  }
  spawnFloatingNumber(clientX,clientY,text,color="#8b4e00"){
    const node=document.createElement("div");
    node.className="floating-number";
    node.textContent=text;
    node.style.left=clientX+"px";
    node.style.top=clientY+"px";
    node.style.color=color;
    node.style.fontSize = text.length > 6 ? "20px" : "24px";
    document.getElementById("app").appendChild(node);
    setTimeout(()=>node.remove(),850);
  }
  refreshBanner(){
    const banner=this.gachaSystem.getCurrentBanner();
    const title=document.getElementById("gachaTitle");
    const desc=document.getElementById("gachaDesc");
    const cost=document.getElementById("gachaCost");
    title.textContent = banner.title;
    desc.textContent = banner.description;
    cost.textContent = banner.type === "secretZ" ? "フードゴット・根源10個" : Util.formatYen(banner.cost);
  }
  summon(){
    const banner = this.gachaSystem.getCurrentBanner();
    if(banner.type === "secretZ"){
      if(this.currency < 1000000){
        this.noticeText.innerHTML = `<b>条件不足</b><br>シークレットZガチャは資金がKB単位のユーザー向けです。`;
        this.popupController.show(this.noticePopup);
        return;
      }
      this.currency = 0;
      this.currencyUI.setCurrency(this.currency);
      const result = this.gachaSystem.summon();
      this.rareEffect.playSummon(result.god.rarity);
      const inst = this.boardManager.addGod(result.god.id);
      this.boardManager.showSynergyLabel("シークレットZ", inst.x, inst.y - 38);
      this.recalculateStats();
      this.saveGame();
      return;
    }
    if(this.yen < banner.cost){
      this.noticeText.innerHTML = `<b>所持金不足</b><br>必要: ${Util.formatYen(banner.cost)}<br>所持: ${Util.formatYen(this.yen)}`;
      this.popupController.show(this.noticePopup);
      return;
    }
    this.yen -= banner.cost;
    this.currencyUI.setYen(this.yen);
    const result = this.gachaSystem.summon();
    this.rareEffect.playSummon(result.god.rarity);
    const inst = this.boardManager.addGod(result.god.id);
    if(result.god.rarity === "UltraRare" || result.god.rarity === "Secret") this.boardManager.showSynergyLabel(result.god.name, inst.x, inst.y - 38);
    this.recalculateStats();
    this.saveGame();
  }
  tryMerge(uidA,uidB){
    const a=this.boardManager.getByUid(uidA), b=this.boardManager.getByUid(uidB);
    if(!this.mergeSystem.canMerge(a,b)){ this.recalculateStats(); return; }
    const result=this.mergeSystem.merge(a,b); if(!result) return;
    this.boardManager.removeByUid(a.uid); this.boardManager.removeByUid(b.uid);
    const newInst=this.boardManager.addGod(result.newGodId, result.x, result.y);
    this.rareEffect.playMerge(result.data.rarity);
    this.showMergePopup(result.data);
    this.boardManager.showSynergyLabel("進化", newInst.x, newInst.y - 40);
    if(result.data.id === "ss_food_ark"){
      this.noticeText.innerHTML = `<b>到達</b><br>フードゴット・聖櫃を入手しました。`;
      setTimeout(()=>this.popupController.show(this.noticePopup),300);

  applyLoginReward(reward){

    else if(reward.type==="todaygod") this.todayGodBoost = true;
    this.currencyUI.setCurrency(this.currency);

  loadGame(){
    const data = SaveManager.load();
    if(!data){
      this.currency=0; this.yen=this.gachaSystem.initialYen; this.boardManager.setInstances([]);
      this.currencyUI.setCurrency(this.currency); this.currencyUI.setYen(this.yen);
      return;
    }
    this.currency = data.currency || 0;
    this.yen = Number.isFinite(data.yen) ? data.yen : this.gachaSystem.initialYen;
    this.loginRareBoost = !!data.loginRareBoost;
    this.todayGodBoost = !!data.todayGodBoost;
    this.lastLoginBonusDate = data.lastLoginBonusDate || null;
    this.umami = data.umami || 0;
    this.boardManager.setInstances(data.instances || []);
    this.currencyUI.setCurrency(this.currency);
    this.currencyUI.setYen(this.yen);
    const offlineReward = SaveManager.calcOfflineReward(data.lastSaveTime || Date.now(), this.productionPerSec);
    if(offlineReward > 0){
      this.currency += offlineReward;
      this.currencyUI.setCurrency(this.currency);
      this.noticeText.innerHTML = `<b>オフライン報酬</b><br>+${Util.formatNumber(offlineReward)} うまみ`;
      this.popupController.show(this.noticePopup);
    }

  saveGame(){
    SaveManager.save({
      currency:this.currency,
      yen:this.yen,
      umami:this.umami || 0,
      instances:this.boardManager.serialize(),
      loginRareBoost:this.loginRareBoost,
      todayGodBoost:this.todayGodBoost,
      lastLoginBonusDate:this.lastLoginBonusDate || null,
      lastSaveTime:Date.now()
    });
  }
  startLoop(){
    const loop=(now)=>{
      const dt=(now-this.lastTickTime)/1000;
      this.lastTickTime=now;
      const gain=this.productionPerSec*dt;
      if(gain>0){ this.currency += gain; this.currencyUI.setCurrency(this.currency); }
      this.refreshBanner();
      this.currencyUI.setYen(this.yen);
      if(Date.now()-this.lastSaveTime > 10000){ this.saveGame(); this.lastSaveTime = Date.now(); }
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  }
}
window.addEventListener("DOMContentLoaded",()=>{ window.game = new GameManager(); });
</script>
